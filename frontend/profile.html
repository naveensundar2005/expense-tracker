<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - FinTrack</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter','Segoe UI',sans-serif;background:#f5f6fa;}
nav{background:white;padding:0 32px;display:flex;justify-content:space-between;align-items:center;height:66px;box-shadow:0 2px 16px rgba(0,0,0,0.06);position:sticky;top:0;z-index:100;}
.logo{font-size:20px;font-weight:800;color:#4f46e5;}
.nav-links{display:flex;gap:4px;}
.nav-link{padding:8px 16px;border-radius:10px;font-size:14px;color:#666;text-decoration:none;font-weight:500;transition:all 0.2s;}
.nav-link:hover,.nav-link.active{background:#f0f0ff;color:#4f46e5;}
.nav-left{display:flex;align-items:center;gap:32px;}
.nav-right{display:flex;align-items:center;gap:12px;}
.avatar-sm{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;}
.logout-btn{padding:8px 16px;background:#fef2f2;color:#dc2626;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;}
.main{max-width:900px;margin:0 auto;padding:32px 24px;}
.hero{background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:22px;padding:44px;color:white;display:flex;align-items:center;gap:32px;margin-bottom:24px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:rgba(255,255,255,0.08);border-radius:50%;}
.big-avatar{width:96px;height:96px;border-radius:50%;background:white;color:#4f46e5;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:36px;flex-shrink:0;box-shadow:0 8px 24px rgba(0,0,0,0.2);cursor:pointer;transition:transform 0.2s;position:relative;z-index:1;}
.big-avatar:hover{transform:scale(1.05);}
.hero-info{flex:1;position:relative;z-index:1;}
.hero-name{font-size:26px;font-weight:800;margin-bottom:4px;}
.hero-username{font-size:14px;opacity:0.8;margin-bottom:4px;}
.hero-sub{font-size:13px;opacity:0.7;margin-bottom:20px;}
.hero-stats{display:flex;gap:32px;}
.hstat-val{font-size:22px;font-weight:800;}
.hstat-label{font-size:11px;opacity:0.75;}
.edit-hero-btn{position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:white;padding:8px 18px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;z-index:1;}
.edit-hero-btn:hover{background:rgba(255,255,255,0.3);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.card{background:white;border-radius:18px;padding:26px;box-shadow:0 4px 16px rgba(0,0,0,0.06);}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.card h3{font-size:15px;font-weight:700;color:#1a1a2e;display:flex;align-items:center;gap:8px;}
.edit-btn-sm{padding:7px 16px;background:#f0f0ff;color:#4f46e5;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.info-item{background:#f9f9ff;border-radius:12px;padding:14px;}
.info-label{font-size:11px;color:#bbb;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.info-value{font-size:14px;font-weight:600;color:#1a1a2e;word-break:break-word;}
.finance-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;}
.fin-item{border-radius:14px;padding:18px;text-align:center;}
.fin-item.inc{background:#f0fdf4;}.fin-item.exp{background:#fef2f2;}.fin-item.bal{background:#f0f0ff;}
.fin-icon{font-size:22px;margin-bottom:8px;}
.fin-label{font-size:11px;color:#888;margin-bottom:4px;font-weight:500;}
.fin-val{font-size:18px;font-weight:800;}
.inc .fin-val{color:#10b981;}.exp .fin-val{color:#ef4444;}.bal .fin-val{color:#4f46e5;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:20px;padding:32px;width:100%;max-width:560px;box-shadow:0 24px 80px rgba(0,0,0,0.2);animation:modalIn 0.3s ease;max-height:90vh;overflow-y:auto;}
@keyframes modalIn{from{opacity:0;transform:scale(0.95);}to{opacity:1;transform:scale(1);}}
.modal h3{font-size:18px;font-weight:700;margin-bottom:4px;color:#1a1a2e;}
.modal-sub{font-size:13px;color:#888;margin-bottom:20px;}
.form-group{margin-bottom:14px;}
label{display:block;font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
input,select{width:100%;padding:12px 14px;border:2px solid #f0f0f0;border-radius:12px;font-size:14px;outline:none;transition:all 0.2s;font-family:inherit;color:#333;}
input:focus,select:focus{border-color:#4f46e5;box-shadow:0 0 0 4px rgba(79,70,229,0.08);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-footer{display:flex;gap:10px;margin-top:20px;}
.btn-cancel{flex:1;padding:12px;background:#f5f5f5;color:#555;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-save{flex:2;padding:12px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-save:disabled{opacity:0.6;cursor:not-allowed;}
.avatar-section{margin-bottom:20px;}
.avatar-section p{font-size:12px;color:#888;font-weight:600;margin-bottom:10px;}
.avatar-options{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.avatar-opt{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;border:3px solid transparent;background:#f5f5f5;transition:all 0.2s;}
.avatar-opt:hover,.avatar-opt.selected{border-color:#4f46e5;background:#f0f0ff;transform:scale(1.1);}
.toast{position:fixed;bottom:24px;right:24px;background:#10b981;color:white;padding:14px 24px;border-radius:12px;font-weight:600;font-size:14px;box-shadow:0 8px 24px rgba(16,185,129,0.3);transform:translateY(100px);opacity:0;transition:all 0.4s;z-index:9999;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.error{background:#ef4444;box-shadow:0 8px 24px rgba(239,68,68,0.3);}
.loading{text-align:center;padding:40px;color:#888;font-size:14px;}
</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <div class="logo">💰 FinTrack</div>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="expenses.html" class="nav-link">Expenses</a>
      <a href="profile.html" class="nav-link active">Profile</a>
    </div>
  </div>
  <div class="nav-right">
    <div class="avatar-sm" id="nav-avatar">?</div>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div class="main" id="main-content">
  <div class="loading">Loading your profile...</div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>✏️ Edit Profile</h3>
    <p class="modal-sub">Saved directly to database — persists after logout!</p>
    <div class="avatar-section">
      <p>CHOOSE YOUR AVATAR</p>
      <div class="avatar-options">
        <div class="avatar-opt" onclick="pickAvatar(this,'😎')">😎</div>
        <div class="avatar-opt" onclick="pickAvatar(this,'🦁')">🦁</div>
        <div class="avatar-opt" onclick="pickAvatar(this,'🐯')">🐯</div>
        <div class="avatar-opt" onclick="pickAvatar(this,'🦊')">🦊</div>
        <div class="avatar-opt" onclick="pickAvatar(this,'🦄')">🦄</div>
        <div class="avatar-opt" onclick="pickAvatar(this,'🐼')">🐼</div>
        <div class="avatar-opt" onclick="pickAvatar(this,'🚀')">🚀</div>
        <div class="avatar-opt" onclick="pickAvatar(this,'💎')">💎</div>
        <div class="avatar-opt" onclick="pickAvatar(this,'🌟')">🌟</div>
        <div class="avatar-opt" onclick="pickAvatar(this,'🎯')">🎯</div>
        <div class="avatar-opt" onclick="pickAvatar(this,'⚡')">⚡</div>
        <div class="avatar-opt" onclick="pickAvatar(this,'🔥')">🔥</div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>First Name</label><input type="text" id="e-fn"/></div>
      <div class="form-group"><label>Last Name</label><input type="text" id="e-ln"/></div>
    </div>
    <div class="form-group"><label>Email</label><input type="email" id="e-email"/></div>
    <div class="form-group"><label>Phone</label><input type="tel" id="e-phone" placeholder="+91 9876543210"/></div>
    <div class="form-row">
      <div class="form-group"><label>Date of Birth</label><input type="date" id="e-dob"/></div>
      <div class="form-group"><label>Gender</label><select id="e-gender"><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Occupation</label><input type="text" id="e-occ" placeholder="e.g. Developer"/></div>
      <div class="form-group"><label>City</label><input type="text" id="e-city" placeholder="e.g. Chennai"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="save-btn" onclick="saveProfile()">💾 Save to Database</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API='http://localhost:8080';
const token=localStorage.getItem('token');
if(!token)window.location.href='login.html';

let profile={};
let chosenAvatar='';
let txCount=0;
let balance=0;

function showToast(msg,isError=false){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast'+(isError?' error':'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

async function loadAll(){
  try{
    const headers={'Authorization':'Bearer '+token};
    const [pRes,sumRes,expRes]=await Promise.all([
      fetch(`${API}/api/profile`,{headers}),
      fetch(`${API}/api/analytics/summary`,{headers}),
      fetch(`${API}/api/expenses`,{headers})
    ]);

    if(!pRes.ok){
      if(pRes.status===401||pRes.status===403){
        window.location.href='login.html';return;
      }
      throw new Error('Profile load failed: '+pRes.status);
    }

    profile=await pRes.json();
    const sum=await sumRes.json();
    const expenses=await expRes.json();
    txCount=expenses.length;
    balance=sum.balance;

    renderPage(sum,expenses);
  }catch(e){
    console.error(e);
    document.getElementById('main-content').innerHTML=`<div style="text-align:center;padding:40px;color:#ef4444">Failed to load profile. <button onclick="loadAll()" style="color:#4f46e5;background:none;border:none;cursor:pointer;font-weight:600;font-family:inherit">Retry</button></div>`;
  }
}

function renderPage(sum,expenses){
  const username=localStorage.getItem('username')||profile.username||'User';
  const av=profile.avatar||(profile.fullName||username).charAt(0).toUpperCase();
  const name=profile.fullName||username;
  const occ=profile.occupation||'Member';
  const city=profile.city||'';

  document.getElementById('nav-avatar').textContent=av;

  document.getElementById('main-content').innerHTML=`
    <div class="hero">
      <button class="edit-hero-btn" onclick="openEdit()">✏️ Edit Profile</button>
      <div class="big-avatar" onclick="openEdit()" style="font-size:${profile.avatar?'36px':'30px'}">${av}</div>
      <div class="hero-info">
        <div class="hero-name">${name}</div>
        <div class="hero-username">@${profile.username||username}</div>
        <div class="hero-sub">${occ}${city?' • '+city:''}</div>
        <div class="hero-stats">
          <div><div class="hstat-val">${txCount}</div><div class="hstat-label">Transactions</div></div>
          <div><div class="hstat-val">₹${Number(balance).toLocaleString('en-IN')}</div><div class="hstat-label">Balance</div></div>
          <div><div class="hstat-val">${profile.createdAt?new Date(profile.createdAt).toLocaleDateString('en-IN',{month:'short',year:'numeric'}):new Date().toLocaleDateString('en-IN',{month:'short',year:'numeric'})}</div><div class="hstat-label">Member since</div></div>
        </div>
      </div>
    </div>

    <div class="finance-grid">
      <div class="fin-item inc"><div class="fin-icon">💚</div><div class="fin-label">Total Income</div><div class="fin-val">₹${Number(sum.totalIncome).toLocaleString('en-IN')}</div></div>
      <div class="fin-item exp"><div class="fin-icon">❤️</div><div class="fin-label">Total Expense</div><div class="fin-val">₹${Number(sum.totalExpense).toLocaleString('en-IN')}</div></div>
      <div class="fin-item bal"><div class="fin-icon">💜</div><div class="fin-label">Net Balance</div><div class="fin-val">₹${Number(sum.balance).toLocaleString('en-IN')}</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3>👤 Personal Details</h3>
        <button class="edit-btn-sm" onclick="openEdit()">✏️ Edit</button>
      </div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">Full Name</div><div class="info-value">${profile.fullName||'Not set'}</div></div>
        <div class="info-item"><div class="info-label">Username</div><div class="info-value">@${profile.username||username}</div></div>
        <div class="info-item"><div class="info-label">Email</div><div class="info-value">${profile.email||'Not set'}</div></div>
        <div class="info-item"><div class="info-label">Phone</div><div class="info-value">${profile.phone||'Not set'}</div></div>
        <div class="info-item"><div class="info-label">Date of Birth</div><div class="info-value">${profile.dateOfBirth?new Date(profile.dateOfBirth).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}):'Not set'}</div></div>
        <div class="info-item"><div class="info-label">Gender</div><div class="info-value">${profile.gender||'Not set'}</div></div>
        <div class="info-item"><div class="info-label">Occupation</div><div class="info-value">${profile.occupation||'Not set'}</div></div>
        <div class="info-item"><div class="info-label">City</div><div class="info-value">${profile.city||'Not set'}</div></div>
      </div>
    </div>
  `;
}

function openEdit(){
  const parts=(profile.fullName||'').split(' ');
  document.getElementById('e-fn').value=parts[0]||'';
  document.getElementById('e-ln').value=parts.slice(1).join(' ')||'';
  document.getElementById('e-email').value=profile.email||'';
  document.getElementById('e-phone').value=profile.phone||'';
  document.getElementById('e-dob').value=profile.dateOfBirth||'';
  document.getElementById('e-gender').value=profile.gender||'';
  document.getElementById('e-occ').value=profile.occupation||'';
  document.getElementById('e-city').value=profile.city||'';
  chosenAvatar=profile.avatar||'';
  document.querySelectorAll('.avatar-opt').forEach(o=>{
    o.classList.toggle('selected',o.textContent===chosenAvatar);
  });
  document.getElementById('modal').classList.add('open');
}

function pickAvatar(el,emoji){
  document.querySelectorAll('.avatar-opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  chosenAvatar=emoji;
}

function closeModal(){document.getElementById('modal').classList.remove('open');}

async function saveProfile(){
  const btn=document.getElementById('save-btn');
  btn.disabled=true;
  btn.textContent='Saving...';

  const fn=document.getElementById('e-fn').value.trim();
  const ln=document.getElementById('e-ln').value.trim();
  const body={
    fullName:`${fn} ${ln}`.trim()||null,
    email:document.getElementById('e-email').value||null,
    phone:document.getElementById('e-phone').value||null,
    gender:document.getElementById('e-gender').value||null,
    occupation:document.getElementById('e-occ').value||null,
    city:document.getElementById('e-city').value||null,
    dateOfBirth:document.getElementById('e-dob').value||null,
    avatar:chosenAvatar||null
  };

  try{
    const res=await fetch(`${API}/api/profile`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify(body)
    });

    if(res.ok){
      profile=await res.json();
      closeModal();
      const headers={'Authorization':'Bearer '+token};
      const [sumRes,expRes]=await Promise.all([
        fetch(`${API}/api/analytics/summary`,{headers}),
        fetch(`${API}/api/expenses`,{headers})
      ]);
      const sum=await sumRes.json();
      const expenses=await expRes.json();
      txCount=expenses.length;
      balance=sum.balance;
      renderPage(sum,expenses);
      document.getElementById('nav-avatar').textContent=profile.avatar||(profile.fullName||'U').charAt(0).toUpperCase();
      showToast('✅ Profile saved to database!');
    }else{
      const err=await res.text();
      console.error('Save failed:',res.status,err);
      showToast('❌ Save failed: '+res.status,true);
    }
  }catch(e){
    console.error(e);
    showToast('❌ Network error. Check Spring Boot is running.',true);
  }

  btn.disabled=false;
  btn.textContent='💾 Save to Database';
}

function logout(){
  localStorage.removeItem('token');
  localStorage.removeItem('username');
  window.location.href='login.html';
}

loadAll();
</script>
</body>
</html>
