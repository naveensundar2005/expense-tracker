<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expenses - FinTrack</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter','Segoe UI',sans-serif;background:#f5f6fa;}
  nav{background:white;padding:0 32px;display:flex;justify-content:space-between;align-items:center;height:66px;box-shadow:0 2px 16px rgba(0,0,0,0.06);position:sticky;top:0;z-index:100;}
  .logo{font-size:20px;font-weight:800;color:#4f46e5;}
  .nav-links{display:flex;gap:4px;}
  .nav-link{padding:8px 16px;border-radius:10px;font-size:14px;color:#666;text-decoration:none;font-weight:500;transition:all 0.2s;}
  .nav-link:hover,.nav-link.active{background:#f0f0ff;color:#4f46e5;}
  .nav-left{display:flex;align-items:center;gap:32px;}
  .nav-right{display:flex;align-items:center;gap:12px;}
  .avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;}
  .logout-btn{padding:8px 16px;background:#fef2f2;color:#dc2626;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;}
  .main{max-width:1200px;margin:0 auto;padding:32px 24px;}
  .pills{display:flex;gap:16px;margin-bottom:28px;}
  .pill{background:white;border-radius:14px;padding:18px 22px;box-shadow:0 4px 16px rgba(0,0,0,0.06);flex:1;display:flex;align-items:center;gap:14px;transition:transform 0.2s;}
  .pill:hover{transform:translateY(-2px);}
  .pill-icon{font-size:24px;}
  .pill-label{font-size:11px;color:#aaa;font-weight:600;text-transform:uppercase;}
  .pill-value{font-size:20px;font-weight:800;}
  .add-form{background:white;border-radius:18px;padding:28px;box-shadow:0 4px 16px rgba(0,0,0,0.06);margin-bottom:24px;}
  .add-form h3{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:20px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  label{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:0.5px;}
  input,select{padding:12px 14px;border:2px solid #f0f0f0;border-radius:12px;font-size:14px;outline:none;transition:all 0.2s;font-family:inherit;color:#333;}
  input:focus,select:focus{border-color:#4f46e5;box-shadow:0 0 0 4px rgba(79,70,229,0.08);}
  .bottom-row{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:end;}
  .add-btn{padding:13px 36px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;font-family:inherit;}
  .add-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,70,229,0.3);}
  .msg{padding:12px 16px;border-radius:10px;font-size:13px;margin-top:14px;display:none;font-weight:500;}
  .msg.success{background:#f0fdf4;color:#16a34a;display:block;} .msg.error{background:#fef2f2;color:#dc2626;display:block;}
  .table-card{background:white;border-radius:18px;padding:26px;box-shadow:0 4px 16px rgba(0,0,0,0.06);}
  .table-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px;}
  .table-top h3{font-size:15px;font-weight:700;color:#1a1a2e;}
  .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .search-box{padding:9px 14px;border:2px solid #f0f0f0;border-radius:10px;font-size:13px;outline:none;width:200px;font-family:inherit;transition:border-color 0.2s;}
  .search-box:focus{border-color:#4f46e5;}
  .filters{display:flex;gap:6px;}
  .filter-btn{padding:8px 16px;border-radius:20px;border:2px solid #f0f0f0;background:white;font-size:12px;cursor:pointer;font-weight:600;color:#888;transition:all 0.2s;font-family:inherit;}
  .filter-btn.active{background:#4f46e5;color:white;border-color:#4f46e5;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;padding:12px 14px;font-size:11px;color:#bbb;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid #f5f5f5;}
  td{padding:14px;font-size:13px;border-bottom:1px solid #f9f9f9;color:#444;transition:background 0.15s;}
  tr:hover td{background:#fafeff;}
  tr:last-child td{border-bottom:none;}
  .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;}
  .badge-income{background:#f0fdf4;color:#16a34a;} .badge-expense{background:#fef2f2;color:#dc2626;}
  .actions-cell{display:flex;gap:6px;}
  .edit-btn{background:#f0f0ff;border:none;color:#4f46e5;cursor:pointer;font-size:12px;padding:6px 12px;border-radius:8px;font-weight:600;font-family:inherit;transition:background 0.2s;}
  .edit-btn:hover{background:#e0e0ff;}
  .del-btn{background:#fef2f2;border:none;color:#dc2626;cursor:pointer;font-size:12px;padding:6px 12px;border-radius:8px;font-weight:600;font-family:inherit;transition:background 0.2s;}
  .del-btn:hover{background:#fee2e2;}
  .empty{text-align:center;padding:48px;color:#bbb;font-size:14px;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .modal-overlay.open{display:flex;}
  .modal{background:white;border-radius:20px;padding:32px;width:100%;max-width:500px;box-shadow:0 24px 80px rgba(0,0,0,0.2);animation:modalIn 0.3s ease;}
  @keyframes modalIn{from{opacity:0;transform:scale(0.95);}to{opacity:1;transform:scale(1);}}
  .modal h3{font-size:18px;font-weight:700;margin-bottom:20px;color:#1a1a2e;}
  .modal-footer{display:flex;gap:10px;margin-top:20px;}
  .btn-cancel{flex:1;padding:12px;background:#f5f5f5;color:#555;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
  .btn-save{flex:2;padding:12px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <div class="logo">💰 FinTrack</div>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="expenses.html" class="nav-link active">Expenses</a>
      <a href="profile.html" class="nav-link">Profile</a>
    </div>
  </div>
  <div class="nav-right">
    <div class="avatar" id="nav-avatar">?</div>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div class="main">
  <div class="pills">
    <div class="pill"><div class="pill-icon">💚</div><div><div class="pill-label">Income</div><div class="pill-value" id="p-income" style="color:#10b981">₹0</div></div></div>
    <div class="pill"><div class="pill-icon">❤️</div><div><div class="pill-label">Expenses</div><div class="pill-value" id="p-expense" style="color:#ef4444">₹0</div></div></div>
    <div class="pill"><div class="pill-icon">💜</div><div><div class="pill-label">Balance</div><div class="pill-value" id="p-balance" style="color:#4f46e5">₹0</div></div></div>
    <div class="pill"><div class="pill-icon">📊</div><div><div class="pill-label">Entries</div><div class="pill-value" id="p-count" style="color:#f59e0b">0</div></div></div>
  </div>

  <div class="add-form">
    <h3>➕ Add New Entry</h3>
    <div class="form-grid">
      <div class="form-group"><label>Amount (₹)</label><input type="number" id="amount" placeholder="0.00" step="0.01" min="0"/></div>
      <div class="form-group"><label>Type</label><select id="type"><option value="EXPENSE">💸 Expense</option><option value="INCOME">💰 Income</option></select></div>
      <div class="form-group"><label>Date</label><input type="date" id="date"/></div>
      <div class="form-group"><label>Category</label><select id="category"><option value="">-- Select --</option><option>🍕 Food & Dining</option><option>🚗 Transport</option><option>🛒 Shopping</option><option>💊 Health</option><option>🎬 Entertainment</option><option>📚 Education</option><option>💡 Utilities</option><option>🏠 Rent</option><option>💼 Salary</option><option>💻 Freelance</option><option>📈 Investment</option><option>🎁 Other</option></select></div>
    </div>
    <div class="bottom-row">
      <div class="form-group"><label>Description</label><input type="text" id="description" placeholder="What was this for?"/></div>
      <button class="add-btn" onclick="addExpense()">Add Entry</button>
    </div>
    <div id="form-msg" class="msg"></div>
  </div>

  <div class="table-card">
    <div class="table-top">
      <h3>All Transactions</h3>
      <div class="controls">
        <input type="text" class="search-box" id="search" placeholder="🔍 Search transactions..." oninput="renderTable()"/>
        <div class="filters">
          <button class="filter-btn active" onclick="setFilter('ALL',this)">All</button>
          <button class="filter-btn" onclick="setFilter('EXPENSE',this)">Expenses</button>
          <button class="filter-btn" onclick="setFilter('INCOME',this)">Income</button>
        </div>
      </div>
    </div>
    <table>
      <thead><tr><th>#</th><th>Date</th><th>Description</th><th>Type</th><th>Amount</th><th>Actions</th></tr></thead>
      <tbody id="exp-body"><tr><td colspan="6" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>✏️ Edit Entry</h3>
    <input type="hidden" id="edit-id"/>
    <div class="form-grid" style="grid-template-columns:1fr 1fr;margin-bottom:14px;">
      <div class="form-group"><label>Amount</label><input type="number" id="edit-amount" step="0.01"/></div>
      <div class="form-group"><label>Type</label><select id="edit-type"><option value="EXPENSE">💸 Expense</option><option value="INCOME">💰 Income</option></select></div>
      <div class="form-group"><label>Date</label><input type="date" id="edit-date"/></div>
      <div class="form-group"><label>Category</label><select id="edit-category"><option value="">-- Select --</option><option>🍕 Food & Dining</option><option>🚗 Transport</option><option>🛒 Shopping</option><option>💊 Health</option><option>🎬 Entertainment</option><option>📚 Education</option><option>💡 Utilities</option><option>🏠 Rent</option><option>💼 Salary</option><option>💻 Freelance</option><option>📈 Investment</option><option>🎁 Other</option></select></div>
    </div>
    <div class="form-group"><label>Description</label><input type="text" id="edit-desc" placeholder="Description"/></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
const API='http://localhost:8080';
const token=localStorage.getItem('token');
if(!token)window.location.href='login.html';
const username=localStorage.getItem('username')||'U';
const fullname=localStorage.getItem('fullname')||username;
const initials=fullname.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
document.getElementById('nav-avatar').textContent=initials;
document.getElementById('date').value=new Date().toISOString().split('T')[0];

let allExpenses=[];
let currentFilter='ALL';

async function loadAll(){
  const [expRes,sumRes]=await Promise.all([
    fetch(`${API}/api/expenses`,{headers:{'Authorization':'Bearer '+token}}),
    fetch(`${API}/api/analytics/summary`,{headers:{'Authorization':'Bearer '+token}})
  ]);
  allExpenses=await expRes.json();
  const sum=await sumRes.json();
  document.getElementById('p-income').textContent='₹'+sum.totalIncome.toLocaleString('en-IN');
  document.getElementById('p-expense').textContent='₹'+sum.totalExpense.toLocaleString('en-IN');
  document.getElementById('p-balance').textContent='₹'+sum.balance.toLocaleString('en-IN');
  document.getElementById('p-count').textContent=allExpenses.length;
  renderTable();
}

function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTable();}

function renderTable(){
  const search=document.getElementById('search').value.toLowerCase();
  let data=currentFilter==='ALL'?allExpenses:allExpenses.filter(e=>e.type===currentFilter);
  if(search)data=data.filter(e=>(e.description||'').toLowerCase().includes(search)||e.type.toLowerCase().includes(search));
  const tbody=document.getElementById('exp-body');
  if(data.length===0){tbody.innerHTML='<tr><td colspan="6" class="empty">No entries found</td></tr>';return;}
  tbody.innerHTML=data.map((e,i)=>`<tr>
    <td style="color:#bbb;font-size:12px;font-weight:600">${i+1}</td>
    <td style="color:#888;font-size:12px">${new Date(e.expenseDate).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</td>
    <td style="font-weight:500">${e.description||'<span style="color:#ddd">No description</span>'}</td>
    <td><span class="badge ${e.type==='INCOME'?'badge-income':'badge-expense'}">${e.type}</span></td>
    <td style="font-weight:800;color:${e.type==='INCOME'?'#10b981':'#ef4444'}">₹${parseFloat(e.amount).toLocaleString('en-IN')}</td>
    <td><div class="actions-cell"><button class="edit-btn" onclick="openEdit(${e.id},'${e.amount}','${e.type}','${e.expenseDate}','${(e.description||'').replace(/'/g,"\\'")}')">✏️ Edit</button><button class="del-btn" onclick="deleteExpense(${e.id})">🗑️ Delete</button></div></td>
  </tr>`).join('');
}

async function addExpense(){
  const amount=document.getElementById('amount').value;
  const type=document.getElementById('type').value;
  const date=document.getElementById('date').value;
  const cat=document.getElementById('category').value;
  const desc=document.getElementById('description').value;
  const msg=document.getElementById('form-msg');
  if(!amount||!date){msg.className='msg error';msg.textContent='Please enter amount and date';return;}
  const description=desc+(cat?' ('+cat+')':'');
  const res=await fetch(`${API}/api/expenses`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({amount:parseFloat(amount),type,description,expenseDate:date})});
  if(res.ok){msg.className='msg success';msg.textContent='✅ Entry added successfully!';document.getElementById('amount').value='';document.getElementById('description').value='';document.getElementById('category').value='';setTimeout(()=>{msg.style.display='none';},2500);loadAll();}
  else{msg.className='msg error';msg.textContent='Failed to add entry';}
}

function openEdit(id,amount,type,date,desc){
  document.getElementById('edit-id').value=id;
  document.getElementById('edit-amount').value=amount;
  document.getElementById('edit-type').value=type;
  document.getElementById('edit-date').value=date;
  document.getElementById('edit-desc').value=desc;
  document.getElementById('edit-modal').classList.add('open');
}

function closeModal(){document.getElementById('edit-modal').classList.remove('open');}

async function saveEdit(){
  const id=document.getElementById('edit-id').value;
  const amount=document.getElementById('edit-amount').value;
  const type=document.getElementById('edit-type').value;
  const date=document.getElementById('edit-date').value;
  const description=document.getElementById('edit-desc').value;
  const res=await fetch(`${API}/api/expenses/${id}`,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({amount:parseFloat(amount),type,description,expenseDate:date})});
  if(res.ok){closeModal();loadAll();}
  else alert('Failed to update');
}

async function deleteExpense(id){
  if(!confirm('Delete this entry?'))return;
  await fetch(`${API}/api/expenses/${id}`,{method:'DELETE',headers:{'Authorization':'Bearer '+token}});
  loadAll();
}

function logout(){localStorage.clear();window.location.href='login.html';}
loadAll();
</script>
</body>
</html>
